<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdelrhman ayman mohamed | Dashbord</title>
    <link rel="stylesheet" href="new.css">
</head>
<body>
<section id="site1">
        <div class="container">
            <div class="right" style="grid-column: 1 / span 2;">
                <div class="card cyan">
                    <h2>Color Palette Preview</h2>
                    <div class="palette" id="palette"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="site2">
        <div class="card">
            <div class="title">Generated Table Preview</div>
            <div class="table-box">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section id="site3">
        <div class="container">
            <div class="card cyan" style="grid-column: 1 / span 3;">
                <h2>Smart Tasks</h2>
                <div class="preview">
                    <input type="text" id="taskInput" placeholder="Enter new task... (press Enter)" />
                    <div id="taskList"></div>
                </div>
            </div>
        </div>
    </section>
    
</body>
<script src="new.js"></script>
</html>
